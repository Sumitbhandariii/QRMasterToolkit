name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies perfectly
        run: |
          npm install --legacy-peer-deps
          npm install ajv ajv-keywords --save-dev --legacy-peer-deps

      - name: Force Install Google Ads Plugin
        run: |
          npm install react-native-google-mobile-ads --legacy-peer-deps

      - name: Verify Expo Config Now
        run: npx expo config

      - name: Build Android locally on GitHub
        run: |
          npx eas-cli init --id 5c735bd2-34f0-44b6-9015-92dc33311ac5 --non-interactive --force
          npx eas-cli build --platform android --non-interactive --profile preview --local --output my-app.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          NODE_ENV: production

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Android-APK
          path: my-app.apk
          
