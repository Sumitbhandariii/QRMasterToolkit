name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies perfectly
        run: |
          npm install --legacy-peer-deps
          npm install ajv ajv-keywords --save-dev --legacy-peer-deps

      - name: 🚨 CATCH THE HIDDEN ERROR 🚨
        run: npx expo config

      - name: Build Android locally on GitHub
        run: |
          eas build --platform android --non-interactive --profile preview --local --output my-app.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          
